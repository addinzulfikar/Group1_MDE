services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spp_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      - db
    networks:
      - spp_net

  nginx:
    image: nginx:1.27-alpine
    container_name: spp_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - spp_net

  db:
    image: mysql:8.4
    container_name: spp_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: spp_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: spp_user
      MYSQL_PASSWORD: spp_pass
    ports:
      - "3307:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - spp_net

volumes:
  dbdata:

networks:
  spp_net:
    driver: bridge
